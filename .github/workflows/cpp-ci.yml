name: C++ CI (MinGW / Ninja)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          git
          base-devel
          mingw-w64-ucrt-x86_64-toolchain
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja

    - name: Build project
      shell: msys2 {0}
      run: |
        ./procpp.sh

    # Optional: Run a smoke test on the built executable
    - name: Test Day 2 executable
      shell: msys2 {0}
      run: |
        ./build/day_02_strings.exe < /dev/null   # or pipe some input if needed

    # Optional later: add ctest -V when you have tests integrated