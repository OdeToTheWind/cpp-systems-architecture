name: C++ CI (MinGW / Ninja)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Cache pacman packages → huge speedup on repeat runs
    - name: Cache MSYS2 pacman packages
      uses: actions/cache@v4
      id: cache-pacman
      with:
        path: C:\msys64\var\cache\pacman\pkg
        key: msys2-ucrt64-pkgs-v1-${{ hashFiles('.github/workflows/cpp-ci.yml') }}
        restore-keys: msys2-ucrt64-pkgs-v1-

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          git
          base-devel
          mingw-w64-ucrt-x86_64-toolchain
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja

    - name: Build project
      shell: msys2 {0}
      run: ./procpp.sh

    # Optional: quick verification
    - name: Check built executables
      shell: msys2 {0}
      run: |
        ls -l build/day_*.exe || echo "No exes found - build may have issues"